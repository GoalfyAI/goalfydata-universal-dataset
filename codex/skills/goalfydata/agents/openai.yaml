interface:
  display_name: GoalfyData
  brand_color: '#6366F1'
  short_description: 当用户需要对数据做深度分析（多轮 SQL 查询、聚合统计、趋势对比等），或需要将数据（Excel / CSV / API
    / 数据库）沉淀为可长期复用、跨平台访问的结构化资产时使用——典型场景包括：复杂或反复的数据分析、跨多个 Agent / 跨服务 / 跨电脑访问同一份数据、把数据分享给他人协作、基于数据构建
    Dashboard 并部署和分享到公网。GoalfyData 独立于单个项目和对话，覆盖从建表、导入、查询分析、治理规则、权限分享、凭证管理、定时自动更新到
    Dashboard 部署的完整数据集生命周期。
policy:
  allow_implicit_invocation: true
dependencies:
  tools:
  - type: mcp
    value: goalfydata-mcp
    transport: streamable_http
    url: https://mcp.goalfydata.ai/mcp
    bearer_token_env_var: GOALFY_UDS_API_TOKEN
