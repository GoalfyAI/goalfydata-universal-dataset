name: Build Platform ZIPs

on:
  push:
    branches: [main]
    paths:
      - 'claude-code/**'
      - 'cursor/**'
      - 'codex/**'
      - 'manus/skill/**'
      - 'generic/**'
      - '!**/*.zip'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build ZIPs
        run: |
          cd cursor && zip -r goalfydata-cursor.zip .cursor-plugin/ mcp.json skills/ LICENSE README.md README.zh-CN.md && cd ..
          cd manus/skill && zip -r ../goalfydata-skill.zip SKILL.md references/ && cd ../..
          cd generic && zip -r goalfydata-generic.zip .mcp.json SKILL.md references/ README.md README.zh-CN.md && cd ..

      - name: Commit and push ZIPs
        run: |
          git config user.name "GoalfyData"
          git config user.email "goalfymax@goalfyai.com"
          git add cursor/goalfydata-cursor.zip manus/goalfydata-skill.zip generic/goalfydata-generic.zip
          if git diff --cached --quiet; then
            echo "No ZIP changes detected, skipping commit."
          else
            git commit -m "chore: auto-build platform zips"
            git pull --rebase origin main
            git push
          fi
